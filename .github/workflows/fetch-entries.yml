name: Fetch DartsAtlas Entries

on:
  workflow_dispatch:
    inputs:
      event_url:
        description: 'DartsAtlas event URL'
        required: true
        type: string
      request_id:
        description: 'Request ID for result lookup'
        required: true
        type: string

jobs:
  fetch-entries:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: 'stable'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Fetch entries from DartsAtlas
        env:
          DARTSATLAS_EMAIL: ${{ secrets.DARTSATLAS_EMAIL }}
          DARTSATLAS_PASSWORD: ${{ secrets.DARTSATLAS_PASSWORD }}
          DISPLAY: ':99'
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 2
          python fetch_entries.py "${{ inputs.event_url }}" "${{ inputs.request_id }}" > /tmp/fetch_result.json 2>&1 || true
          cat /tmp/fetch_result.json

      - name: Push results to Supabase
        run: |
          # Extract the JSON result (last JSON object in output)
          RESULT=$(python3 -c "
          import json, sys
          text = open('/tmp/fetch_result.json').read()
          # Find the JSON object in the output
          start = text.rfind('{')
          if start >= 0:
              end = text.rfind('}') + 1
              data = json.loads(text[start:end])
              players = data.get('players', [])
              title = data.get('title', 'Unknown')
              row = {
                  'name': '${{ inputs.request_id }}',
                  'description': title,
                  'list_type': 'entry_check',
                  'region': None,
                  'player_ids': [p['id'] for p in players],
                  'player_data': players,
              }
              print(json.dumps(row))
          else:
              print('{}')
          ")

          if [ "$RESULT" = "{}" ]; then
            echo "No result to push"
            exit 0
          fi

          # Delete existing
          curl -s -X DELETE \
            "https://tlfunituxidxdzxzqcou.supabase.co/rest/v1/eligibility_lists?list_type=eq.entry_check&name=eq.${{ inputs.request_id }}" \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}"

          # Insert
          HTTP_CODE=$(curl -s -o /tmp/sb_response.txt -w "%{http_code}" -X POST \
            "https://tlfunituxidxdzxzqcou.supabase.co/rest/v1/eligibility_lists" \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "$RESULT")

          echo "Supabase response: $HTTP_CODE"
          if [ "$HTTP_CODE" != "201" ]; then
            cat /tmp/sb_response.txt
            exit 1
          fi
          echo "Successfully pushed to Supabase"
