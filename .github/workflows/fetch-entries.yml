name: Fetch DartsAtlas Entries

on:
  workflow_dispatch:
    inputs:
      event_url:
        description: 'DartsAtlas event URL'
        required: true
        type: string
      request_id:
        description: 'Request ID for result lookup'
        required: true
        type: string

jobs:
  fetch-entries:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: 'stable'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Fetch entries from DartsAtlas
        env:
          DARTSATLAS_EMAIL: ${{ secrets.DARTSATLAS_EMAIL }}
          DARTSATLAS_PASSWORD: ${{ secrets.DARTSATLAS_PASSWORD }}
          DISPLAY: ':99'
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 2
          python fetch_entries.py "${{ inputs.event_url }}" "${{ inputs.request_id }}" 1>/tmp/fetch_result.json 2>/tmp/fetch_log.txt || true
          echo "--- Log ---"
          cat /tmp/fetch_log.txt
          echo "--- Result ---"
          cat /tmp/fetch_result.json

      - name: Push results to Supabase
        env:
          SB_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python3 -c "
          import json, sys
          data = json.loads(open('/tmp/fetch_result.json').read().strip())
          players = data.get('players', [])
          row = {'name': sys.argv[1], 'description': data.get('title',''), 'list_type': 'entry_check', 'region': None, 'player_ids': [p['id'] for p in players], 'player_data': players}
          open('/tmp/sb_payload.json','w').write(json.dumps(row))
          print(f'Prepared: {len(players)} players')
          " "${{ inputs.request_id }}"

          curl -s -X DELETE \
            "https://tlfunituxidxdzxzqcou.supabase.co/rest/v1/eligibility_lists?list_type=eq.entry_check&name=eq.${{ inputs.request_id }}" \
            -H "apikey: ${SB_KEY}" \
            -H "Authorization: Bearer ${SB_KEY}"

          HTTP_CODE=$(curl -s -o /tmp/sb_resp.txt -w "%{http_code}" -X POST \
            "https://tlfunituxidxdzxzqcou.supabase.co/rest/v1/eligibility_lists" \
            -H "apikey: ${SB_KEY}" \
            -H "Authorization: Bearer ${SB_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d @/tmp/sb_payload.json)

          echo "Supabase POST: ${HTTP_CODE}"
          if [ "${HTTP_CODE}" != "201" ]; then
            cat /tmp/sb_resp.txt
            exit 1
          fi
          echo "SUCCESS"
