name: Fetch DartsAtlas Entries

on:
  workflow_dispatch:
    inputs:
      event_url:
        description: 'DartsAtlas event URL'
        required: true
        type: string
      request_id:
        description: 'Request ID for result lookup'
        required: true
        type: string

jobs:
  fetch-entries:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: 'stable'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Fetch entries from DartsAtlas
        env:
          DARTSATLAS_EMAIL: ${{ secrets.DARTSATLAS_EMAIL }}
          DARTSATLAS_PASSWORD: ${{ secrets.DARTSATLAS_PASSWORD }}
          DISPLAY: ':99'
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 2
          python fetch_entries.py "${{ inputs.event_url }}" "${{ inputs.request_id }}" 1>/tmp/fetch_result.json 2>/tmp/fetch_log.txt || true
          echo "--- Log ---"
          cat /tmp/fetch_log.txt
          echo "--- Result ---"
          cat /tmp/fetch_result.json

      - name: Build payload
        run: |
          python3 -c "
          import json,sys
          data=json.loads(open('/tmp/fetch_result.json').read().strip())
          p=data.get('players',[])
          row={'name':sys.argv[1],'description':data.get('title',''),'list_type':'entry_check','region':None,'player_ids':[x['id'] for x in p],'player_data':p}
          open('/tmp/sb_payload.json','w').write(json.dumps(row))
          print(f'{len(p)} players, {len(open(\"/tmp/sb_payload.json\").read())} bytes')
          " "${{ inputs.request_id }}"

      - name: Delete existing entry
        run: |
          curl -s -X DELETE \
            "https://tlfunituxidxdzxzqcou.supabase.co/rest/v1/eligibility_lists?list_type=eq.entry_check&name=eq.${{ inputs.request_id }}" \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}"

      - name: Insert to Supabase
        run: |
          HTTP=$(curl -s -o /tmp/sb_resp.txt -w "%{http_code}" -X POST \
            "https://tlfunituxidxdzxzqcou.supabase.co/rest/v1/eligibility_lists" \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d @/tmp/sb_payload.json)
          echo "HTTP: $HTTP"
          test "$HTTP" = "201" || { cat /tmp/sb_resp.txt; exit 1; }
          echo "Pushed to Supabase successfully"
