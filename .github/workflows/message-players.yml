name: Message Players on DartsAtlas

on:
  workflow_dispatch:
    inputs:
      tournament_url:
        description: 'DartsAtlas tournament URL'
        required: true
        type: string
      player_ids:
        description: 'Comma-separated player IDs to message'
        required: true
        type: string
      message:
        description: 'Message to send (max 280 chars)'
        required: true
        type: string
      request_id:
        description: 'Request ID for status tracking'
        required: true
        type: string
      da_email:
        description: 'DartsAtlas email'
        required: true
        type: string
      da_password:
        description: 'DartsAtlas password'
        required: true
        type: string

jobs:
  message-players:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: 'stable'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Message players
        env:
          DISPLAY: ':99'
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 2
          python message_players.py "${{ inputs.tournament_url }}" "${{ inputs.player_ids }}" "${{ inputs.message }}" "${{ inputs.da_email }}" "${{ inputs.da_password }}" 1>/tmp/msg_result.json 2>/tmp/msg_log.txt || true
          echo "--- Log ---"
          cat /tmp/msg_log.txt
          echo "--- Result ---"
          cat /tmp/msg_result.json

      - name: Save result to Supabase
        run: |
          RESULT=$(cat /tmp/msg_result.json | python3 -c "
          import json, sys
          text = sys.stdin.read().strip()
          try:
              data = json.loads(text)
              row = {'name': '${{ inputs.request_id }}', 'description': json.dumps(data), 'list_type': 'message_result', 'region': None, 'player_ids': data.get('sent', []), 'player_data': []}
              print(json.dumps(row))
          except:
              print('{}')
          ")
          if [ "$RESULT" = "{}" ]; then exit 0; fi

          curl -s -X DELETE \
            "https://tlfunituxidxdzxzqcou.supabase.co/rest/v1/eligibility_lists?list_type=eq.message_result&name=eq.${{ inputs.request_id }}" \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}"

          curl -s -X POST \
            "https://tlfunituxidxdzxzqcou.supabase.co/rest/v1/eligibility_lists" \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d @- <<< "$RESULT"
